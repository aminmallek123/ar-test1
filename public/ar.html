<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar-nft.js"></script>
    <style>
      body { margin: 0; overflow: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #e8e8e8; }
      canvas { image-rendering: auto; image-rendering: crisp-edges; }
      .arjs-loader {
        height: 100%; width: 100%; position: absolute;
        top: 0; left: 0; background-color: rgba(0,0,0,0.8);
        z-index: 9999; display: flex;
        justify-content: center; align-items: center;
      }
      .arjs-loader div { text-align: center; font-size: 1.25em; color: white; }
      #hint {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6); color: white;
        padding: 8px 16px; border-radius: 20px;
        font-size: 12px; z-index: 9999;
        pointer-events: none; text-align: center;
        display: block;
      }
      #debug {
        position: fixed; top: 10px; left: 10px;
        background: rgba(0,0,0,0.75); color: lime;
        padding: 8px 12px; font-size: 11px;
        z-index: 9999; border-radius: 6px;
        pointer-events: none;
        font-family: monospace;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="arjs-loader"><div>Loading, please wait...</div></div>
    <div id="debug">Loading...</div>
    <div id="hint">
      📱 1 doigt: rotation | 2 doigts: zoom
    </div>

    <a-scene
      id="arScene"
      vr-mode-ui="enabled: false;"
      renderer="antialias: false; alpha: true; colorManagement: false"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; patternRatioWidth: 0.5;"
      embedded
    >
      <a-assets timeout="30000">
        <a-asset-item id="myModel" src="/models/object_0.glb"></a-asset-item>
      </a-assets>

      <!-- Optimized Lighting (reduced for low-end devices) -->
      <a-light type="ambient" intensity="2.0" color="#ffffff"></a-light>
      <a-light type="directional" intensity="1.2" position="5 10 5" color="#ffffff"></a-light>
      <a-light type="directional" intensity="0.8" position="-5 8 -5" color="#ffffff"></a-light>

      <!-- NFT Marker Detection -->
      <a-nft
        type="nft"
        url="/markers/uno"
        smooth="true"
        smoothcount="5"
        smoothtolerance="0.01"
        emitevents="true"
      >
        <!-- 3D Model appears only when marker detected -->
        <!-- Scale will be dynamically adjusted in JavaScript based on device screen size -->
        <a-entity id="model3d" gltf-model="#myModel" scale="1 1 1" rotation="0 0 0" position="0 0 0"></a-entity>
      </a-nft>

      <!-- Fallback entity for world mode (visible when marker not found after timeout) -->
      <a-entity id="worldModel" position="0 0 -2" visible="false">
        <a-entity id="modelWorld" gltf-model="#myModel" scale="1 1 1" rotation="0 0 0" position="0 0 0"></a-entity>
      </a-entity>

      <a-camera position="0 0 0"></a-camera>
    </a-scene>

    <script>
      // ─── Global State ────────────────────────────────────────
      let markerFound = false;
      let markerDetectionTimeout = null;
      let markerLastSeen = Date.now();
      const MARKER_TIMEOUT = 8000; // 8 seconds without marker = switch to world mode
      
      // ─── Device Detection & Optimization ──────────────────
      function detectDevicePerformance() {
        const ua = navigator.userAgent.toLowerCase();
        const isLowEndDevice = /xiaomi|budget|galaxy j|moto g|redmi|realme 5|realme 6|blackberry|nokia|sony ericsson/i.test(ua);
        const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);
        
        // Check screen size - small screens are often paired with low-end chips
        const screenWidth = Math.min(window.screen.width, window.screen.height);
        const isSmallScreen = screenWidth < 450;
        
        // Check GPU capabilities
        let gl;
        try {
          const canvas = document.createElement('canvas');
          gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        } catch (e) {
          console.warn('WebGL creation failed:', e);
          gl = null;
        }
        
        const maxPixelRatio = window.devicePixelRatio || 1;
        const maxTextureSize = gl ? gl.getParameter(gl.MAX_TEXTURE_SIZE) : 2048;
        const maxRenderbufferSize = gl ? gl.getParameter(gl.MAX_RENDERBUFFER_SIZE) : 2048;
        const hasLowGPU = maxTextureSize <= 1024 || maxRenderbufferSize <= 1024;
        
        // Aggressive optimization for small screens
        const effectivelyLowEnd = isLowEndDevice || hasLowGPU || isSmallScreen;
        
        const config = {
          isLowEnd: effectivelyLowEnd,
          isMobile: isMobile,
          isSmallScreen: isSmallScreen,
          screenWidth: screenWidth,
          pixelRatio: effectivelyLowEnd ? 0.75 : Math.min(maxPixelRatio, 1.5),
          precision: effectivelyLowEnd ? 'lowp' : 'mediump',
          anisotropy: effectivelyLowEnd ? 1 : 4,
          maxTextureSize: maxTextureSize,
          antialias: !effectivelyLowEnd,
          hasWebGL: !!gl,
          hasLowGPU: hasLowGPU
        };
        
        console.log(`📱 Device: ${effectivelyLowEnd ? 'LOW-END' : 'HIGH-END'} | Screen: ${screenWidth}px | GPU: ${hasLowGPU ? 'LOW' : 'NORMAL'} | Ratio: ${config.pixelRatio}`);
        return config;
      }
      
      // ─── Responsive Scale Calculation ──────────────────────
      function calculateAdaptiveScale(deviceConfig) {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const aspectRatio = vw / vh;
        
        // MORE AGGRESSIVE SCALING FOR SMALL SCREENS
        let baseScale = 40;
        
        if (vw < 350) {
          // Very small devices (< 350px width) - phones with very small screens
          baseScale = 20;
        } else if (vw < 400) {
          // Small devices (350-400px width)
          baseScale = 28;
        } else if (vw < 500) {
          // Mid-size devices (400-500px)
          baseScale = 40;
        } else if (vw < 600) {
          // Larger phones (500-600px)
          baseScale = 50;
        } else if (vw < 1024) {
          // Tablets in portrait
          baseScale = 70;
        } else {
          // Tablets/iPad in landscape or large devices
          baseScale = 80;
        }
        
        // Adjust for aspect ratio extremes
        if (aspectRatio > 2.0) {
          // Very wide screens (landscape)
          baseScale *= 0.85;
        } else if (aspectRatio < 0.6) {
          // Very tall screens
          baseScale *= 0.9;
        }
        
        // For low-end devices with small screens, be even more aggressive
        if (deviceConfig.isSmallScreen && deviceConfig.isLowEnd) {
          baseScale *= 0.8;
        }
        
        console.log(`📐 Viewport: ${vw}x${vh} | Aspect: ${aspectRatio.toFixed(2)} | Scale: ${baseScale.toFixed(1)}`);
        return baseScale;
      }
      
      const deviceConfig = detectDevicePerformance();
      const initialScale = calculateAdaptiveScale(deviceConfig);
      
      // Update renderer attributes dynamically
      const arScene = document.querySelector('#arScene');
      let rendererAttrs = `antialias: ${deviceConfig.antialias}; alpha: true; pixelRatio: ${deviceConfig.pixelRatio};`;
      arScene.setAttribute('renderer', rendererAttrs);

      const scene   = document.querySelector('a-scene');
      const modelEl = document.querySelector('#model3d');
      const worldModelEl = document.querySelector('#modelWorld');
      const worldContainer = document.querySelector('#worldModel');
      const debug   = document.getElementById('debug');
      const nftEl   = document.querySelector('a-nft');

      // Show device info on debug panel
      debug.style.display = 'block';
      debug.innerHTML = `📱 Device: ${deviceConfig.isLowEnd ? 'LOW-END' : 'HIGH-END'}<br>Screen: ${deviceConfig.screenWidth}px<br>Ratio: ${deviceConfig.pixelRatio}<br>Scale: ${initialScale.toFixed(1)}<br>⏳ Initializing...`;

      // Set initial scale for marker model
      modelEl.setAttribute('scale', `${initialScale} ${initialScale} ${initialScale}`);
      
      // Set initial scale for world model
      worldModelEl.setAttribute('scale', `${initialScale} ${initialScale} ${initialScale}`);

// ─── Apply Materials to Model ────────────────────────
      function setupModelMaterials(mesh) {
        if (!mesh) return { meshCount: 0, materialCount: 0 };
        
        let meshCount = 0;
        let materialCount = 0;

        // AUTO-CENTER AND MAINTAIN ORIGINAL DIMENSIONS
        const box = new THREE.Box3().setFromObject(mesh);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        console.log(`📏 Original dimensions - Width: ${size.x.toFixed(2)}, Height: ${size.y.toFixed(2)}, Depth: ${size.z.toFixed(2)}`);
        
        // Center the model but keep original size
        mesh.position.sub(center);

        // Apply MeshBasicMaterial to all meshes
        mesh.traverse((node) => {
          if (node.isMesh) {
            meshCount++;
            
            const materialsArray = Array.isArray(node.material) ? node.material : [node.material];
            
            materialsArray.forEach((oldMat, idx) => {
              const newMat = new THREE.MeshBasicMaterial({
                side: THREE.DoubleSide,
                wireframe: false,
                fog: false,
                toneMapped: false
              });

              // Copy color with brightness boost
              if (oldMat.color) {
                newMat.color.copy(oldMat.color);
                newMat.color.multiplyScalar(2.0);
              } else {
                newMat.color.set(0xffffff);
              }

              // Copy and optimize texture
              if (oldMat.map) {
                newMat.map = oldMat.map;
                newMat.map.minFilter = THREE.LinearFilter;
                newMat.map.magFilter = THREE.LinearFilter;
                newMat.map.anisotropy = deviceConfig.anisotropy;
              }

              // Optimize material quality
              newMat.flatShading = deviceConfig.isLowEnd ? true : false;

              // Copy transparency
              if (oldMat.transparent) {
                newMat.transparent = true;
                newMat.opacity = oldMat.opacity || 1.0;
              }

              newMat.needsUpdate = true;
              materialCount++;

              if (Array.isArray(node.material)) {
                node.material[idx] = newMat;
              } else {
                node.material = newMat;
              }
            });
          }
        });

        return { meshCount, materialCount, size };
      }
      
      // ─── Model Loaded (Marker Mode) ──────────────────────────
      modelEl.addEventListener('model-loaded', () => {
        console.log('✅ Marker model loaded!');
        const mesh = modelEl.getObject3D('mesh');
        
        if (!mesh) {
          console.error('No mesh in model');
          return;
        }

        const result = setupModelMaterials(mesh);
        debug.innerHTML = `✅ Model Ready!<br>Meshes: ${result.meshCount}<br>Materials: ${result.materialCount}`;
        console.log(`✅ Model ready: ${result.meshCount} meshes`);
      });

      modelEl.addEventListener('model-error', (e) => {
        console.error('Marker model error:', e.detail);
        debug.innerHTML = `❌ Model Error!<br>Marker: ${e.detail}`;
      });

      // ─── Model Loaded (World Mode Fallback) ──────────────────
      worldModelEl.addEventListener('model-loaded', () => {
        console.log('✅ World model loaded!');
        const mesh = worldModelEl.getObject3D('mesh');
        
        if (!mesh) {
          console.error('No mesh in world model');
          return;
        }

        const result = setupModelMaterials(mesh);
        console.log(`✅ World model ready: ${result.meshCount} meshes`);
      });

      worldModelEl.addEventListener('model-error', (e) => {
        console.error('World model error:', e.detail);
      });

      // ─── Marker Events + Fallback Mode ──────────────────────
      nftEl.addEventListener('markerFound', () => {
        console.log('✅ NFT Marker Found!');
        markerFound = true;
        markerLastSeen = Date.now();
        
        // Switch from world mode to marker mode
        modelEl.setAttribute('visible', 'true');
        worldContainer.setAttribute('visible', 'false');
        
        // Clear timeout
        if (markerDetectionTimeout) {
          clearTimeout(markerDetectionTimeout);
          markerDetectionTimeout = null;
        }
        
        debug.innerHTML = '✅ Marker OK! 1 finger: rotate | 2 fingers: zoom';
      });

      nftEl.addEventListener('markerLost', () => {
        console.log('⚠️ NFT Marker Lost');
        markerFound = false;
        modelEl.setAttribute('visible', 'false');
        debug.innerHTML = '⏳ Marker lost... trying to find...';
        
        // Start fallback timer - if marker not found in Xms, switch to world mode
        if (!markerDetectionTimeout) {
          markerDetectionTimeout = setTimeout(() => {
            console.log('⚠️ Marker not found for', MARKER_TIMEOUT / 1000, 's - switching to WORLD MODE');
            worldContainer.setAttribute('visible', 'true');
            debug.innerHTML = '📍 WORLD MODE - No marker detected. 1 finger: rotate | 2 fingers: zoom';
            markerDetectionTimeout = null;
          }, MARKER_TIMEOUT);
        }
      });
      
      // Error handling for marker tracking
      scene.addEventListener('error', (e) => {
        console.error('❌ Scene error:', e);
        debug.innerHTML = '❌ Error detected. Check console.';
      });

      // ─── Scene Ready ────────────────────────────────────────
      scene.addEventListener('loaded', () => {
        document.querySelector('.arjs-loader').style.display = 'none';
        console.log('🎬 AR Scene loaded');
        debug.innerHTML = '⏳ Aiming at marker...';
        
        // Optimize renderer for device capability
        const renderer = scene.renderer;
        if (renderer) {
          try {
            renderer.outputEncoding = THREE.sRGBEncoding;
            
            if (!deviceConfig.isLowEnd) {
              renderer.toneMapping = THREE.ACESFilmicToneMapping;
              renderer.toneMappingExposure = 2.5;
              console.log('✅ Full rendering optimized');
            } else {
              // Lightweight rendering for low-end
              renderer.toneMapping = THREE.LinearToneMapping;
              renderer.toneMappingExposure = 1.0;
              console.log('✅ Lightweight rendering for low-end device');
            }
          } catch (e) {
            console.warn('⚠️ Some renderer settings not supported:', e.message);
          }
        }
      });

      // ─── Mouse Controls ─────────────────────────────────────
      let mouseDown = false, rightClick = false;
      let lastX = 0, lastY = 0;
      let rotX = 0, rotY = 0;
      let panX = 0, panY = 0;
      let scale = 1; // Professional size
      
      // Smoothing for stable display
      let smoothedRotX = 0, smoothedRotY = 0;
      let smoothedPanX = 0, smoothedPanY = 0;
      let smoothedScale = 1;
      const SMOOTHNESS = 0.05; // Ultra-smooth, ultra-stable

      document.addEventListener('contextmenu', e => e.preventDefault());
      
      document.addEventListener('mousedown', (e) => {
        mouseDown = true;
        rightClick = e.button === 2;
        lastX = e.clientX;
        lastY = e.clientY;
      });

      document.addEventListener('mouseup', () => { mouseDown = false; });

      document.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;

        if (rightClick) {
          panX += dx * 0.1;
          panY -= dy * 0.1;
        } else {
          rotY += dx * 0.5;
          rotX += dy * 0.5;
          rotX = Math.max(-89, Math.min(89, rotX));
        }

        updateTransform();
      });

      document.addEventListener('wheel', (e) => {
        e.preventDefault();
        scale *= e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.max(0.5, Math.min(20, scale)); // Larger max zoom
        updateTransform();
      }, { passive: false });

      function updateTransform() {
        // Apply exponential smoothing to prevent vibration
        smoothedRotX += (rotX - smoothedRotX) * SMOOTHNESS;
        smoothedRotY += (rotY - smoothedRotY) * SMOOTHNESS;
        smoothedPanX += (panX - smoothedPanX) * SMOOTHNESS;
        smoothedPanY += (panY - smoothedPanY) * SMOOTHNESS;
        smoothedScale += (scale - smoothedScale) * SMOOTHNESS;

        // Update both marker and world models
        const position = new THREE.Vector3(smoothedPanX, smoothedPanY, 0);
        const rotation = new THREE.Euler(
          THREE.MathUtils.degToRad(smoothedRotX),
          THREE.MathUtils.degToRad(smoothedRotY),
          0,
          'YXZ'
        );
        const scaleVec = new THREE.Vector3(smoothedScale, smoothedScale, smoothedScale);
        
        // Update marker model
        if (modelEl.object3D) {
          modelEl.object3D.position.copy(position);
          modelEl.object3D.rotation.copy(rotation);
          modelEl.object3D.scale.copy(scaleVec);
        }
        
        // Update world model
        if (worldContainer.object3D) {
          worldContainer.object3D.position.copy(position);
          worldContainer.object3D.rotation.copy(rotation);
          worldContainer.object3D.scale.copy(scaleVec);
        }
      }

      // ─── Touch Controls - Rotation + Pinch Zoom ────────────
      let lastTouchDistance = 0;
      let touchIdentifiers = {};
      
      document.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          // Single finger - rotation only
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
          console.log('📱 Single touch: rotation mode');
        } else if (e.touches.length === 2) {
          // Two fingers - pinch zoom
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          const dx = touch2.clientX - touch1.clientX;
          const dy = touch2.clientY - touch1.clientY;
          lastTouchDistance = Math.sqrt(dx * dx + dy * dy);
          console.log('📱 Two-finger touch: zoom mode');
        }
      });

      document.addEventListener('touchmove', (e) => {
        e.preventDefault();
        
        if (e.touches.length === 1) {
          // Single finger - rotation only
          const touch = e.touches[0];
          const dx = touch.clientX - lastX;
          const dy = touch.clientY - lastY;
          lastX = touch.clientX;
          lastY = touch.clientY;

          rotY += dx * 0.8;
          rotX += dy * 0.8;
          
          // Limit rotation to prevent going off-screen
          rotX = Math.max(-180, Math.min(180, rotX));
          rotY = Math.max(-180, Math.min(180, rotY));
          
          updateTransform();
        } else if (e.touches.length === 2) {
          // Two fingers - pinch zoom
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          const dx = touch2.clientX - touch1.clientX;
          const dy = touch2.clientY - touch1.clientY;
          const currentDistance = Math.sqrt(dx * dx + dy * dy);
          
          if (lastTouchDistance > 0) {
            const zoomFactor = currentDistance / lastTouchDistance;
            scale *= zoomFactor;
            scale = Math.max(0.5, Math.min(20, scale)); // Zoom limits
            lastTouchDistance = currentDistance;
            updateTransform();
          }
        }
      }, { passive: false });

      document.addEventListener('touchend', () => {
        lastTouchDistance = 0;
        console.log('📱 Touch ended');
      });

      console.log('✅ AR App initialized');

      // ─── Orientation & Resize Handler ──────────────────────
      let orientationTimeout;
      window.addEventListener('orientationchange', () => {
        clearTimeout(orientationTimeout);
        orientationTimeout = setTimeout(() => {
          const newScale = calculateAdaptiveScale(deviceConfig);
          modelEl.setAttribute('scale', `${newScale} ${newScale} ${newScale}`);
          worldModelEl.setAttribute('scale', `${newScale} ${newScale} ${newScale}`);
          console.log(`🔄 Orientation changed → New scale: ${newScale.toFixed(1)}`);
          debug.innerHTML = `🔄 Orientation changed<br>New scale: ${newScale.toFixed(1)}<br>⏳ Recalibrating...`;
          
          setTimeout(() => {
            if (markerFound) {
              debug.innerHTML = '✅ Marker Detected! 1 finger: rotate | 2 fingers: zoom';
            } else {
              debug.innerHTML = '📍 WORLD MODE - 1 finger: rotate | 2 fingers: zoom';
            }
          }, 500);
        }, 300);
      });

      window.addEventListener('resize', () => {
        clearTimeout(orientationTimeout);
        orientationTimeout = setTimeout(() => {
          const newScale = calculateAdaptiveScale(deviceConfig);
          modelEl.setAttribute('scale', `${newScale} ${newScale} ${newScale}`);
          worldModelEl.setAttribute('scale', `${newScale} ${newScale} ${newScale}`);
          console.log(`📐 Viewport resized → New scale: ${newScale.toFixed(1)}`);
        }, 300);
      });

      // ─── Camera Permission Handler ───────────────────────────
      // navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      //   .then(stream => {
      //     stream.getTracks().forEach(track => track.stop());
      //     console.log('✅ Camera permission granted');
      //     debug.innerHTML = '✅ Ready! Touch to control<br>1 finger: rotate<br>2 fingers: zoom';
      //   })
      //   .catch(err => {
      //     console.error('❌ Camera error:', err);
          
      //     if (err.name === 'NotReadableError') {
      //       debug.innerHTML = '❌ Camera busy!<br>Close other apps.';
      //     } else if (err.name === 'NotAllowedError') {
      //       debug.innerHTML = '❌ Permission denied!<br>Autorisez la caméra.';
      //     } else {
      //       debug.innerHTML = '❌ Camera error: ' + err.name;
      //     }
      //   });
    </script>
  </body>
</html>
