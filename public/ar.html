<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar-nft.js"></script>
    <style>
      body { margin: 0; overflow: hidden; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background: #e8e8e8; }
      canvas { image-rendering: auto; image-rendering: crisp-edges; }
      .arjs-loader {
        height: 100%; width: 100%; position: absolute;
        top: 0; left: 0; background-color: rgba(0,0,0,0.8);
        z-index: 9999; display: flex;
        justify-content: center; align-items: center;
      }
      .arjs-loader div { text-align: center; font-size: 1.25em; color: white; }
      #hint {
        position: fixed; bottom: 20px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6); color: white;
        padding: 8px 16px; border-radius: 20px;
        font-size: 12px; z-index: 9999;
        pointer-events: none; text-align: center;
        display: block;
      }
      #debug {
        position: fixed; top: 10px; left: 10px;
        background: rgba(0,0,0,0.75); color: lime;
        padding: 8px 12px; font-size: 11px;
        z-index: 9999; border-radius: 6px;
        pointer-events: none;
        font-family: monospace;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="arjs-loader"><div>Loading, please wait...</div></div>
    <div id="debug">Loading...</div>
    <div id="hint">
      📱 1 doigt: rotation | 2 doigts: zoom
    </div>

    <a-scene
      id="arScene"
      vr-mode-ui="enabled: false;"
      renderer="antialias: true; alpha: true; colorManagement: true"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
      embedded
    >
      <a-assets timeout="30000">
        <a-asset-item id="myModel" src="/models/object_0.glb"></a-asset-item>
      </a-assets>

      <!-- Optimized Lighting (reduced for low-end devices) -->
      <a-light type="ambient" intensity="2.0" color="#ffffff"></a-light>
      <a-light type="directional" intensity="1.2" position="5 10 5" color="#ffffff"></a-light>
      <a-light type="directional" intensity="0.8" position="-5 8 -5" color="#ffffff"></a-light>

      <!-- NFT Marker Detection -->
      <a-nft
        type="nft"
        url="/markers/uno"
        smooth="true"
        smoothcount="2"
        smoothtolerance="0.05"
      >
        <!-- 3D Model appears only when marker detected -->
        <!-- Scale will be dynamically adjusted in JavaScript based on device screen size -->
        <a-entity id="model3d" gltf-model="#myModel" scale="1 1 1" rotation="0 0 0" position="0 0 0"></a-entity>
      </a-nft>

      <a-camera position="0 0 0"></a-camera>
    </a-scene>

    <script>
      // ─── Device Detection & Optimization ──────────────────
      function detectDevicePerformance() {
        const ua = navigator.userAgent.toLowerCase();
        const isLowEndDevice = /xiaomi|budget|galaxy j|moto g|redmi|realme 5|realme 6/i.test(ua);
        const isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);
        
        // Check GPU capabilities
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        const maxPixelRatio = window.devicePixelRatio || 1;
        const maxTextureSize = gl ? gl.getParameter(gl.MAX_TEXTURE_SIZE) : 2048;
        
        const config = {
          isLowEnd: isLowEndDevice,
          isMobile: isMobile,
          pixelRatio: isLowEndDevice ? 1 : Math.min(maxPixelRatio, 2),
          precision: isLowEndDevice ? 'lowp' : 'mediump',
          anisotropy: isLowEndDevice ? 1 : 16,
          maxTextureSize: maxTextureSize,
          antialias: !isLowEndDevice
        };
        
        console.log(`📱 Device: ${isLowEndDevice ? 'LOW-END' : 'HIGH-END'} | Ratio: ${config.pixelRatio} | Precision: ${config.precision}`);
        return config;
      }
      
      // ─── Responsive Scale Calculation ──────────────────────
      function calculateAdaptiveScale() {
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        const aspectRatio = vw / vh;
        
        // Scale base on viewport size (empirically optimized for 40 80 80 reference)
        let baseScale = 40;
        
        if (vw < 400) {
          // Small devices (< 400px width)
          baseScale = 30;
        } else if (vw < 600) {
          // Mid-size devices (400-600px)
          baseScale = 50;
        } else if (vw < 1024) {
          // Tablets in portrait
          baseScale = 70;
        } else {
          // Tablets/iPad in landscape or large devices
          baseScale = 80;
        }
        
        // Adjust for aspect ratio extremes
        if (aspectRatio > 2.0) {
          // Very wide screens (landscape)
          baseScale *= 0.9;
        } else if (aspectRatio < 0.6) {
          // Very tall screens
          baseScale *= 0.95;
        }
        
        console.log(`📐 Viewport: ${vw}x${vh} | Aspect: ${aspectRatio.toFixed(2)} → Scale: ${baseScale.toFixed(1)}`);
        return baseScale;
      }
      
      const deviceConfig = detectDevicePerformance();
      const initialScale = calculateAdaptiveScale();
      
      // Update renderer attributes dynamically
      const arScene = document.querySelector('#arScene');
      let rendererAttrs = `antialias: ${deviceConfig.antialias}; alpha: true; colorManagement: true; pixelRatio: ${deviceConfig.pixelRatio}; precision: ${deviceConfig.precision};`;
      arScene.setAttribute('renderer', rendererAttrs);

      const scene   = document.querySelector('a-scene');
      const modelEl = document.querySelector('#model3d');
      const debug   = document.getElementById('debug');
      const nftEl   = document.querySelector('a-nft');

      // Show device info on debug panel
      debug.style.display = 'block';
      debug.innerHTML = `📱 Device: ${deviceConfig.isLowEnd ? 'LOW-END' : 'HIGH-END'}<br>Ratio: ${deviceConfig.pixelRatio}<br>Scale: ${initialScale.toFixed(1)}<br>⏳ Initializing...`;

      // Set initial scale
      modelEl.setAttribute('scale', `${initialScale} ${initialScale} ${initialScale}`);

      // ─── Model Loaded ────────────────────────────────────────
      modelEl.addEventListener('model-loaded', () => {
        console.log('✅ Model loaded!');
        const mesh = modelEl.getObject3D('mesh');
        
        if (!mesh) {
          debug.innerHTML = '❌ Mesh not found!';
          console.error('No mesh in model');
          return;
        }

        let meshCount = 0;
        let materialCount = 0;

        // AUTO-CENTER AND MAINTAIN ORIGINAL DIMENSIONS
        const box = new THREE.Box3().setFromObject(mesh);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        console.log(`📏 Original dimensions - Width: ${size.x.toFixed(2)}, Height: ${size.y.toFixed(2)}, Depth: ${size.z.toFixed(2)}`);
        
        // Center the model but keep original size
        mesh.position.sub(center);

        // Apply MeshBasicMaterial to all meshes
        mesh.traverse((node) => {
          if (node.isMesh) {
            meshCount++;
            
            const materialsArray = Array.isArray(node.material) ? node.material : [node.material];
            
            materialsArray.forEach((oldMat, idx) => {
              const newMat = new THREE.MeshBasicMaterial({
                side: THREE.DoubleSide,
                wireframe: false,
                fog: false,
                toneMapped: true
              });

              // Copy color with MAXIMUM brightness boost
              if (oldMat.color) {
                newMat.color.copy(oldMat.color);
                // MAXIMUM color boost for maximum vibrant display
                newMat.color.multiplyScalar(2.5);
              } else {
                newMat.color.set(0xffffff);
              }

              // Copy and optimize texture for sharpness
              if (oldMat.map) {
                newMat.map = oldMat.map;
                newMat.map.minFilter = THREE.LinearMipmapLinearFilter;
                newMat.map.magFilter = THREE.LinearFilter;
                newMat.map.anisotropy = deviceConfig.anisotropy;
                newMat.map.encoding = THREE.sRGBEncoding;
              }

              // Improve material quality (reduce for low-end)
              newMat.flatShading = deviceConfig.isLowEnd ? true : false;
              newMat.dithering = !deviceConfig.isLowEnd;

              // Copy transparency
              if (oldMat.transparent) {
                newMat.transparent = true;
                newMat.opacity = oldMat.opacity || 1.0;
              }

              newMat.needsUpdate = true;
              materialCount++;

              if (Array.isArray(node.material)) {
                node.material[idx] = newMat;
              } else {
                node.material = newMat;
              }
            });
          }
        });

        debug.innerHTML = `✅ Model Ready!<br>Meshes: ${meshCount}<br>Materials: ${materialCount}<br>Size: ${size.x.toFixed(1)}×${size.y.toFixed(1)}×${size.z.toFixed(1)}`;
        console.log(`✅ Model ready: ${meshCount} meshes, ${materialCount} materials with colors`);
      });

      modelEl.addEventListener('model-error', (e) => {
        console.error('Model error:', e.detail);
        debug.innerHTML = `❌ Model Error!<br>${e.detail}`;
      });
      
      // WebGL context loss recovery
      window.addEventListener('webglcontextlost', (e) => {
        console.warn('⚠️ WebGL context lost');
        e.preventDefault();
      });
      
      window.addEventListener('webglcontextrestored', () => {
        console.log('✅ WebGL context restored');
      });

      // ─── Marker Events ──────────────────────────────────────
      nftEl.addEventListener('markerFound', () => {
        console.log('✅ NFT Marker Found!');
        modelEl.setAttribute('visible', 'true');
        debug.innerHTML = '✅ Marker Detected! Rotate to explore';
      });

      nftEl.addEventListener('markerLost', () => {
        console.log('⚠️ NFT Marker Lost');
        modelEl.setAttribute('visible', 'false');
        debug.innerHTML = '⏳ Aiming at marker...';
      });
      
      // Error handling for marker tracking
      scene.addEventListener('error', (e) => {
        console.error('❌ Scene error:', e);
        debug.innerHTML = '❌ Error detected. Check console.';
      });

      // ─── Scene Ready ────────────────────────────────────────
      scene.addEventListener('loaded', () => {
        document.querySelector('.arjs-loader').style.display = 'none';
        console.log('🎬 AR Scene loaded');
        debug.innerHTML = '⏳ Aiming at marker...';
        
        // Optimize renderer for device capability
        const renderer = scene.renderer;
        if (renderer) {
          try {
            renderer.outputEncoding = THREE.sRGBEncoding;
            
            if (!deviceConfig.isLowEnd) {
              renderer.toneMapping = THREE.ACESFilmicToneMapping;
              renderer.toneMappingExposure = 2.5;
              console.log('✅ Full rendering optimized');
            } else {
              // Lightweight rendering for low-end
              renderer.toneMapping = THREE.LinearToneMapping;
              renderer.toneMappingExposure = 1.0;
              console.log('✅ Lightweight rendering for low-end device');
            }
          } catch (e) {
            console.warn('⚠️ Some renderer settings not supported:', e.message);
          }
        }
      });

      // ─── Mouse Controls ─────────────────────────────────────
      let mouseDown = false, rightClick = false;
      let lastX = 0, lastY = 0;
      let rotX = 0, rotY = 0;
      let panX = 0, panY = 0;
      let scale = 1; // Professional size
      
      // Smoothing for stable display
      let smoothedRotX = 0, smoothedRotY = 0;
      let smoothedPanX = 0, smoothedPanY = 0;
      let smoothedScale = 1;
      const SMOOTHNESS = 0.05; // Ultra-smooth, ultra-stable

      document.addEventListener('contextmenu', e => e.preventDefault());
      
      document.addEventListener('mousedown', (e) => {
        mouseDown = true;
        rightClick = e.button === 2;
        lastX = e.clientX;
        lastY = e.clientY;
      });

      document.addEventListener('mouseup', () => { mouseDown = false; });

      document.addEventListener('mousemove', (e) => {
        if (!mouseDown) return;
        
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;

        if (rightClick) {
          panX += dx * 0.1;
          panY -= dy * 0.1;
        } else {
          rotY += dx * 0.5;
          rotX += dy * 0.5;
          rotX = Math.max(-89, Math.min(89, rotX));
        }

        updateTransform();
      });

      document.addEventListener('wheel', (e) => {
        e.preventDefault();
        scale *= e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.max(0.5, Math.min(20, scale)); // Larger max zoom
        updateTransform();
      }, { passive: false });

      function updateTransform() {
        // Apply exponential smoothing to prevent vibration
        smoothedRotX += (rotX - smoothedRotX) * SMOOTHNESS;
        smoothedRotY += (rotY - smoothedRotY) * SMOOTHNESS;
        smoothedPanX += (panX - smoothedPanX) * SMOOTHNESS;
        smoothedPanY += (panY - smoothedPanY) * SMOOTHNESS;
        smoothedScale += (scale - smoothedScale) * SMOOTHNESS;

        modelEl.object3D.position.set(smoothedPanX, smoothedPanY, 0);
        modelEl.object3D.rotation.order = 'YXZ';
        modelEl.object3D.rotation.set(
          THREE.MathUtils.degToRad(smoothedRotX),
          THREE.MathUtils.degToRad(smoothedRotY),
          0
        );
        modelEl.object3D.scale.set(smoothedScale, smoothedScale, smoothedScale);
      }

      // ─── Touch Controls - Rotation + Pinch Zoom ────────────
      let lastTouchDistance = 0;
      let touchIdentifiers = {};
      
      document.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
          // Single finger - rotation only
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
          console.log('📱 Single touch: rotation mode');
        } else if (e.touches.length === 2) {
          // Two fingers - pinch zoom
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          const dx = touch2.clientX - touch1.clientX;
          const dy = touch2.clientY - touch1.clientY;
          lastTouchDistance = Math.sqrt(dx * dx + dy * dy);
          console.log('📱 Two-finger touch: zoom mode');
        }
      });

      document.addEventListener('touchmove', (e) => {
        e.preventDefault();
        
        if (e.touches.length === 1) {
          // Single finger - rotation only
          const touch = e.touches[0];
          const dx = touch.clientX - lastX;
          const dy = touch.clientY - lastY;
          lastX = touch.clientX;
          lastY = touch.clientY;

          rotY += dx * 0.8;
          rotX += dy * 0.8;
          
          // Limit rotation to prevent going off-screen
          rotX = Math.max(-180, Math.min(180, rotX));
          rotY = Math.max(-180, Math.min(180, rotY));
          
          updateTransform();
        } else if (e.touches.length === 2) {
          // Two fingers - pinch zoom
          const touch1 = e.touches[0];
          const touch2 = e.touches[1];
          const dx = touch2.clientX - touch1.clientX;
          const dy = touch2.clientY - touch1.clientY;
          const currentDistance = Math.sqrt(dx * dx + dy * dy);
          
          if (lastTouchDistance > 0) {
            const zoomFactor = currentDistance / lastTouchDistance;
            scale *= zoomFactor;
            scale = Math.max(0.5, Math.min(20, scale)); // Zoom limits
            lastTouchDistance = currentDistance;
            updateTransform();
          }
        }
      }, { passive: false });

      document.addEventListener('touchend', () => {
        lastTouchDistance = 0;
        console.log('📱 Touch ended');
      });

      console.log('✅ AR App initialized');

      // ─── Orientation & Resize Handler ──────────────────────
      let orientationTimeout;
      window.addEventListener('orientationchange', () => {
        clearTimeout(orientationTimeout);
        orientationTimeout = setTimeout(() => {
          const newScale = calculateAdaptiveScale();
          modelEl.setAttribute('scale', `${newScale} ${newScale} ${newScale}`);
          console.log(`🔄 Orientation changed → New scale: ${newScale.toFixed(1)}`);
          debug.innerHTML = `🔄 Orientation changed<br>New scale: ${newScale.toFixed(1)}<br>⏳ Recalibrating...`;
          
          setTimeout(() => {
            debug.innerHTML = '✅ Marker Detected! Rotate to explore';
          }, 1000);
        }, 300);
      });

      window.addEventListener('resize', () => {
        clearTimeout(orientationTimeout);
        orientationTimeout = setTimeout(() => {
          const newScale = calculateAdaptiveScale();
          modelEl.setAttribute('scale', `${newScale} ${newScale} ${newScale}`);
          console.log(`📐 Viewport resized → New scale: ${newScale.toFixed(1)}`);
        }, 300);
      });

      // ─── Camera Permission Handler ───────────────────────────
      // navigator.mediaDevices.getUserMedia({ video: true, audio: false })
      //   .then(stream => {
      //     stream.getTracks().forEach(track => track.stop());
      //     console.log('✅ Camera permission granted');
      //     debug.innerHTML = '✅ Ready! Touch to control<br>1 finger: rotate<br>2 fingers: zoom';
      //   })
      //   .catch(err => {
      //     console.error('❌ Camera error:', err);
          
      //     if (err.name === 'NotReadableError') {
      //       debug.innerHTML = '❌ Camera busy!<br>Close other apps.';
      //     } else if (err.name === 'NotAllowedError') {
      //       debug.innerHTML = '❌ Permission denied!<br>Autorisez la caméra.';
      //     } else {
      //       debug.innerHTML = '❌ Camera error: ' + err.name;
      //     }
      //   });
    </script>
  </body>
</html>
